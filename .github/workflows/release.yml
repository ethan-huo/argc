name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Build declaration snapshot and tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected a semver tag like v0.1.0"
            exit 1
          fi
          PACKAGE_VERSION="$(bun -e 'console.log(await Bun.file("package.json").json().then((pkg) => pkg.version))')"
          if [[ "$VERSION" != "v$PACKAGE_VERSION" ]]; then
            echo "Version mismatch: package.json has $PACKAGE_VERSION but input was $VERSION"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check source
        run: bun run check

      - name: Build declarations
        run: |
          rm -rf dist
          bun run build
          test -f dist/index.d.ts
          test -f dist/terminal.d.ts

      - name: Create release snapshot tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git commit -m "release: $VERSION declarations"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "refs/tags/$VERSION"
